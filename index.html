<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>颜色名称查询 - Color Name Finder</title>
<style>
  :root {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --surface2: #22222e;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text2: #9090a0;
    --accent: #6c8cff;
    --accent2: #a78bfa;
    --danger: #f87171;
    --success: #34d399;
    --warning: #fbbf24;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    line-height: 1.6;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 20px; }
  header {
    text-align: center; padding: 40px 0 30px;
  }
  header h1 { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  header p { color: var(--text2); margin-top: 8px; font-size: 0.95rem; }

  /* Tabs */
  .tabs {
    display: flex; gap: 4px; background: var(--surface);
    border-radius: var(--radius); padding: 4px; margin-bottom: 24px;
  }
  .tab-btn {
    flex: 1; padding: 12px 16px; border: none; background: transparent;
    color: var(--text2); border-radius: var(--radius-sm); cursor: pointer;
    font-size: 0.95rem; font-weight: 500; transition: all 0.2s;
    font-family: inherit;
  }
  .tab-btn:hover { color: var(--text); background: var(--surface2); }
  .tab-btn.active { background: var(--accent); color: #fff; }

  /* Panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Cards */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px; margin-bottom: 20px;
  }
  .card h2 { font-size: 1.15rem; margin-bottom: 16px; color: var(--text); }

  /* Color Picker */
  .picker-row {
    display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap;
  }
  .picker-left { flex: 1; min-width: 240px; }
  .picker-right { flex-shrink: 0; }
  .color-swatch {
    width: 160px; height: 160px; border-radius: var(--radius);
    border: 2px solid var(--border); transition: background 0.2s;
  }
  .input-group { margin-bottom: 14px; }
  .input-group label { display: block; font-size: 0.85rem; color: var(--text2); margin-bottom: 4px; }
  .input-group input {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); background: var(--surface2); color: var(--text);
    font-size: 0.95rem; font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .input-group input:focus { outline: none; border-color: var(--accent); }
  .input-row { display: flex; gap: 8px; }
  .input-row input { flex: 1; }

  /* Color info */
  .color-name-display {
    font-size: 1.6rem; font-weight: 700; margin: 8px 0;
  }
  .color-values { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .val-item {
    background: var(--surface2); padding: 10px 14px; border-radius: var(--radius-sm);
    font-size: 0.9rem;
  }
  .val-item .label { color: var(--text2); font-size: 0.78rem; }
  .val-item .value { font-family: 'SF Mono', 'Fira Code', monospace; margin-top: 2px; }

  /* Buttons */
  .btn {
    padding: 8px 16px; border: none; border-radius: var(--radius-sm);
    cursor: pointer; font-size: 0.88rem; font-weight: 500; transition: all 0.2s;
    font-family: inherit;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-sm { padding: 4px 10px; font-size: 0.78rem; }
  .btn-outline {
    background: transparent; border: 1px solid var(--border); color: var(--text);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btns { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
  .copied-toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: var(--success); color: #000; padding: 10px 24px;
    border-radius: 999px; font-weight: 600; font-size: 0.9rem;
    z-index: 100; opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .copied-toast.show { opacity: 1; }

  /* Color grid */
  .grid-header {
    display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
    align-items: center;
  }
  .grid-header input {
    flex: 1; min-width: 200px; padding: 10px 14px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface2); color: var(--text); font-size: 0.95rem;
    font-family: inherit;
  }
  .grid-header input:focus { outline: none; border-color: var(--accent); }
  .grid-header .count { color: var(--text2); font-size: 0.85rem; white-space: nowrap; }
  .color-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }
  .color-grid-item {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); overflow: hidden; cursor: pointer;
    transition: all 0.2s;
  }
  .color-grid-item:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow); }
  .color-grid-item .swatch-preview {
    height: 70px; transition: background 0.2s;
  }
  .color-grid-item .info {
    padding: 10px; text-align: center;
  }
  .color-grid-item .info .cn-name { font-size: 0.88rem; font-weight: 600; }
  .color-grid-item .info .en-name { font-size: 0.72rem; color: var(--text2); margin-top: 2px; }
  .color-grid-item .info .hex-code { font-size: 0.75rem; color: var(--text2); font-family: 'SF Mono', monospace; }

  /* Detail modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65);
    z-index: 50; align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px; max-width: 440px; width: 90%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  .modal .modal-swatch {
    width: 100%; height: 120px; border-radius: var(--radius-sm);
    margin-bottom: 16px;
  }
  .modal .modal-name { font-size: 1.5rem; font-weight: 700; }
  .modal .modal-en { color: var(--text2); font-size: 0.9rem; }
  .modal .modal-hex { font-family: 'SF Mono', monospace; font-size: 1.1rem; margin-top: 8px; }
  .modal .modal-close {
    margin-top: 16px; float: right;
  }

  /* Palette */
  .palette-row {
    display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px;
  }
  .palette-swatch {
    flex: 1; min-width: 80px; text-align: center;
  }
  .palette-swatch .sw {
    height: 80px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    margin-bottom: 6px;
  }
  .palette-swatch .sw-hex {
    font-family: 'SF Mono', monospace; font-size: 0.75rem; color: var(--text2);
  }
  .palette-swatch .sw-name { font-size: 0.78rem; margin-top: 2px; }

  /* Culture cards */
  .culture-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .culture-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
  }
  .culture-card .cc-swatch {
    width: 100%; height: 60px; border-radius: var(--radius-sm); margin-bottom: 12px;
  }
  .culture-card h3 { font-size: 1.05rem; margin-bottom: 6px; }
  .culture-card p { font-size: 0.85rem; color: var(--text2); line-height: 1.7; }

  @media (max-width: 600px) {
    .container { padding: 12px; }
    .picker-row { flex-direction: column; }
    .color-swatch { width: 100%; height: 120px; }
    .color-values { grid-template-columns: 1fr; }
    .color-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
    .tabs { flex-wrap: wrap; }
    .tab-btn { flex: 1 1 40%; font-size: 0.85rem; padding: 10px 8px; }
  }
</style>
</head>

<div class="copied-toast" id="toast">已复制到剪贴板</div>

<div class="container">
  <header>
    <h1>颜色名称查询</h1>
    <p>输入颜色代码，查找最接近的命名颜色 | 浏览 200+ 种中英文颜色名称</p>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-tab="query">查询颜色</button>
    <button class="tab-btn" data-tab="browse">颜色浏览</button>
    <button class="tab-btn" data-tab="palette">调色板</button>
    <button class="tab-btn" data-tab="culture">文化含义</button>
  </div>

  <!-- Panel: Query -->
  <div class="panel active" id="panel-query">
    <div class="card">
      <h2>输入颜色代码</h2>
      <div class="picker-row">
        <div class="picker-left">
          <div class="input-group">
            <label>十六进制颜色代码</label>
            <div class="input-row">
              <input type="text" id="hexInput" placeholder="#FF6633" value="#FF6633" maxlength="7">
              <input type="color" id="colorPicker" value="#FF6633" style="width:50px;height:44px;padding:2px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;">
            </div>
          </div>
          <div class="color-name-display" id="colorNameDisplay">杏黄 / Apricot</div>
          <div class="color-values" id="colorValues">
            <div class="val-item"><span class="label">RGB</span><div class="value" id="valRgb">rgb(255, 102, 51)</div></div>
            <div class="val-item"><span class="label">HEX</span><div class="value" id="valHex">#FF6633</div></div>
            <div class="val-item"><span class="label">HSL</span><div class="value" id="valHsl">hsl(15, 100%, 60%)</div></div>
            <div class="val-item"><span class="label">CMYK</span><div class="value" id="valCmyk">cmyk(0%, 60%, 80%, 0%)</div></div>
          </div>
          <div class="copy-btns">
            <button class="btn btn-sm btn-outline" data-copy="hex">复制 HEX</button>
            <button class="btn btn-sm btn-outline" data-copy="rgb">复制 RGB</button>
            <button class="btn btn-sm btn-outline" data-copy="hsl">复制 HSL</button>
            <button class="btn btn-sm btn-outline" data-copy="name">复制颜色名</button>
          </div>
        </div>
        <div class="picker-right">
          <div class="color-swatch" id="mainSwatch" style="background:#FF6633;"></div>
        </div>
      </div>
    </div>

    <div class="card" id="nearbyColorsCard">
      <h2>相近命名颜色 TOP 5</h2>
      <div class="color-grid" id="nearbyColorsGrid"></div>
    </div>
  </div>

  <!-- Panel: Browse -->
  <div class="panel" id="panel-browse">
    <div class="card">
      <div class="grid-header">
        <input type="text" id="searchInput" placeholder="搜索颜色名称（中文或英文）...">
        <span class="count" id="colorCount">共 <span id="countNum">0</span> 种颜色</span>
      </div>
      <div class="color-grid" id="colorGrid"></div>
    </div>
  </div>

  <!-- Panel: Palette -->
  <div class="panel" id="panel-palette">
    <div class="card">
      <h2>从基色生成调色板</h2>
      <div class="picker-row">
        <div class="picker-left">
          <div class="input-group">
            <label>基色代码</label>
            <div class="input-row">
              <input type="text" id="paletteHexInput" placeholder="#3B82F6" value="#3B82F6" maxlength="7">
              <input type="color" id="paletteColorPicker" value="#3B82F6" style="width:50px;height:44px;padding:2px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;">
            </div>
          </div>
        </div>
        <div class="picker-right">
          <div class="color-swatch" id="paletteBaseSwatch" style="background:#3B82F6;width:100px;height:100px;"></div>
        </div>
      </div>

      <h3 style="margin-top:20px;">互补色 (Complementary)</h3>
      <div class="palette-row" id="paletteComplementary"></div>

      <h3 style="margin-top:20px;">相邻色 (Analogous)</h3>
      <div class="palette-row" id="paletteAnalogous"></div>

      <h3 style="margin-top:20px;">三角色 (Triadic)</h3>
      <div class="palette-row" id="paletteTriadic"></div>

      <h3 style="margin-top:20px;">单色系 (Monochromatic)</h3>
      <div class="palette-row" id="paletteMonochromatic"></div>
    </div>
  </div>

  <!-- Panel: Culture -->
  <div class="panel" id="panel-culture">
    <div class="culture-grid" id="cultureGrid"></div>
  </div>
</div>

<!-- Detail modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-swatch" id="modalSwatch"></div>
    <div class="modal-name" id="modalName"></div>
    <div class="modal-en" id="modalEn"></div>
    <div class="modal-hex" id="modalHex"></div>
    <div class="color-values" id="modalValues" style="margin-top:12px;"></div>
    <button class="btn btn-outline modal-close" onclick="closeModal()">关闭</button>
  </div>
</div>

// ============ COLOR UTILITIES ============
function hexToRgb(hex) {
  hex = hex.replace(/^#/, '');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  return {
    r: parseInt(hex.substring(0,2), 16),
    g: parseInt(hex.substring(2,4), 16),
    b: parseInt(hex.substring(4,6), 16)
  };
}

function rgbToHex(r, g, b) {
  return '#' + [r, g, b].map(x => {
    const h = Math.round(x).toString(16);
    return h.length === 1 ? '0' + h : h;
  }).join('').toUpperCase();
}

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h = 0, s = 0, l = (max + min) / 2;
  if (max !== min) {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      case b: h = ((r - g) / d + 4) / 6; break;
    }
  }
  return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
}

function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1 - l);
  const f = (n) => {
    const k = (n + h / 30) % 12;
    return l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
  };
  return {
    r: Math.round(f(0) * 255),
    g: Math.round(f(8) * 255),
    b: Math.round(f(4) * 255)
  };
}

function rgbToCmyk(r, g, b) {
  const c = 1 - (r / 255);
  const m = 1 - (g / 255);
  const y = 1 - (b / 255);
  const k = Math.min(c, m, y);
  if (k === 1) return { c: 0, m: 0, y: 0, k: 100 };
  return {
    c: Math.round((c - k) / (1 - k) * 100),
    m: Math.round((m - k) / (1 - k) * 100),
    y: Math.round((y - k) / (1 - k) * 100),
    k: Math.round(k * 100)
  };
}

function colorDistance(c1, c2) {
  const dr = c1.r - c2.r, dg = c1.g - c2.g, db = c1.b - c2.b;
  return Math.sqrt(dr * dr + dg * dg + db * db);
}

function findClosestColors(hex, count = 5) {
  const rgb = hexToRgb(hex);
  const distances = allColors.map(c => ({
    ...c,
    distance: colorDistance(rgb, hexToRgb(c.hex))
  }));
  distances.sort((a, b) => a.distance - b.distance);
  return distances.slice(0, count);
}

function findExactColor(hex) {
  const upper = hex.toUpperCase();
  return allColors.find(c => c.hex.toUpperCase() === upper);
}

// ============ QUERY PANEL ============
function updateQueryPanel(hex) {
  hex = hex.replace(/^#/, '').toUpperCase();
  if (!/^[0-9A-F]{6}$/i.test(hex)) return;
  hex = '#' + hex;

  const exact = findExactColor(hex);
  const closest = findClosestColors(hex, 5);
  const bestColor = exact || closest[0];
  const rgb = hexToRgb(hex);
  const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
  const cmyk = rgbToCmyk(rgb.r, rgb.g, rgb.b);

  // Update swatch
  document.getElementById('mainSwatch').style.background = hex;
  document.getElementById('hexInput').value = hex;
  document.getElementById('colorPicker').value = hex;

  // Update display
  document.getElementById('colorNameDisplay').textContent = bestColor.name + ' / ' + bestColor.en;
  document.getElementById('valRgb').textContent = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
  document.getElementById('valHex').textContent = hex;
  document.getElementById('valHsl').textContent = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
  document.getElementById('valCmyk').textContent = `cmyk(${cmyk.c}%, ${cmyk.m}%, ${cmyk.y}%, ${cmyk.k}%)`;

  // Update nearby colors
  const nearbyGrid = document.getElementById('nearbyColorsGrid');
  nearbyGrid.innerHTML = closest.map(c => {
    const crgb = hexToRgb(c.hex);
    return `<div class="color-grid-item" onclick="showColorDetail(${JSON.stringify(c.name.replace(/"/g,'&quot;'))}, ${JSON.stringify(c.en.replace(/"/g,'&quot;'))}, '${c.hex}')">
      <div class="swatch-preview" style="background:${c.hex};"></div>
      <div class="info">
        <div class="cn-name">${c.name}</div>
        <div class="en-name">${c.en}</div>
        <div class="hex-code">${c.hex}</div>
      </div>
    </div>`;
  }).join('');

  // Store current values for copy
  document.getElementById('panel-query').dataset.currentHex = hex;
  document.getElementById('panel-query').dataset.currentRgb = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
  document.getElementById('panel-query').dataset.currentHsl = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
  document.getElementById('panel-query').dataset.currentName = bestColor.name;
}

// ============ BROWSE PANEL ============
function renderColorGrid(filter = '') {
  const grid = document.getElementById('colorGrid');
  const searchTerm = filter.toLowerCase();
  const filtered = allColors.filter(c =>
    c.name.includes(searchTerm) || c.en.toLowerCase().includes(searchTerm) || c.hex.toLowerCase().includes(searchTerm)
  );
  document.getElementById('countNum').textContent = filtered.length;

  grid.innerHTML = filtered.map(c => `
    <div class="color-grid-item" onclick="showColorDetail(${JSON.stringify(c.name.replace(/"/g,'&quot;'))}, ${JSON.stringify(c.en.replace(/"/g,'&quot;'))}, '${c.hex}')">
      <div class="swatch-preview" style="background:${c.hex};"></div>
      <div class="info">
        <div class="cn-name">${c.name}</div>
        <div class="en-name">${c.en}</div>
        <div class="hex-code">${c.hex}</div>
      </div>
    </div>
  `).join('');
}

// ============ MODAL ============
function showColorDetail(name, en, hex) {
  const rgb = hexToRgb(hex);
  const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
  const cmyk = rgbToCmyk(rgb.r, rgb.g, rgb.b);

  document.getElementById('modalSwatch').style.background = hex;
  document.getElementById('modalName').textContent = name;
  document.getElementById('modalEn').textContent = en;
  document.getElementById('modalHex').textContent = hex;
  document.getElementById('modalValues').innerHTML = `
    <div class="val-item"><span class="label">RGB</span><div class="value">rgb(${rgb.r}, ${rgb.g}, ${rgb.b})</div></div>
    <div class="val-item"><span class="label">HEX</span><div class="value">${hex}</div></div>
    <div class="val-item"><span class="label">HSL</span><div class="value">hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)</div></div>
    <div class="val-item"><span class="label">CMYK</span><div class="value">cmyk(${cmyk.c}%, ${cmyk.m}%, ${cmyk.y}%, ${cmyk.k}%)</div></div>
  `;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ============ PALETTE PANEL ============
function renderPaletteSwatch(hex) {
  const exact = findExactColor(hex);
  const closest = findClosestColors(hex, 1)[0];
  const displayName = exact ? exact.name : closest.name;
  return `
    <div class="palette-swatch">
      <div class="sw" style="background:${hex};" onclick="updateQueryPanel('${hex}');switchTab('query')" title="点击查看详情"></div>
      <div class="sw-hex">${hex}</div>
      <div class="sw-name">${displayName}</div>
    </div>
  `;
}

function updatePalette(hex) {
  hex = hex.replace(/^#/, '').toUpperCase();
  if (!/^[0-9A-F]{6}$/i.test(hex)) return;
  hex = '#' + hex;

  const baseRgb = hexToRgb(hex);
  const baseHsl = rgbToHsl(baseRgb.r, baseRgb.g, baseRgb.b);

  document.getElementById('paletteBaseSwatch').style.background = hex;
  document.getElementById('paletteHexInput').value = hex;
  document.getElementById('paletteColorPicker').value = hex;

  // Complementary
  const complementary = hslToRgb((baseHsl.h + 180) % 360, baseHsl.s, baseHsl.l);
  const compHex = rgbToHex(complementary.r, complementary.g, complementary.b);
  document.getElementById('paletteComplementary').innerHTML =
    renderPaletteSwatch(hex) + renderPaletteSwatch(compHex);

  // Analogous
  const anaColors = [
    hslToRgb((baseHsl.h - 30 + 360) % 360, baseHsl.s, baseHsl.l),
    baseRgb,
    hslToRgb((baseHsl.h + 30) % 360, baseHsl.s, baseHsl.l)
  ];
  document.getElementById('paletteAnalogous').innerHTML = anaColors.map(c =>
    renderPaletteSwatch(rgbToHex(c.r, c.g, c.b))
  ).join('');

  // Triadic
  const triColors = [
    baseRgb,
    hslToRgb((baseHsl.h + 120) % 360, baseHsl.s, baseHsl.l),
    hslToRgb((baseHsl.h + 240) % 360, baseHsl.s, baseHsl.l)
  ];
  document.getElementById('paletteTriadic').innerHTML = triColors.map(c =>
    renderPaletteSwatch(rgbToHex(c.r, c.g, c.b))
  ).join('');

  // Monochromatic
  const monoColors = [90, 70, 50, 30, 10].map(l =>
    hslToRgb(baseHsl.h, baseHsl.s, l)
  );
  document.getElementById('paletteMonochromatic').innerHTML = monoColors.map(c =>
    renderPaletteSwatch(rgbToHex(c.r, c.g, c.b))
  ).join('');
}

  { color: "白色", hex: "#FFFFFF", meaning: "白色在五行中属金，代表西方和秋季。传统上白色与丧事相关，但现在已逐渐接受西方影响，婚礼也开始穿白色婚纱。白色也象征纯洁和素雅。" },
  { color: "紫色", hex: "#884898", meaning: "紫色在中国文化中象征高贵和神秘。"紫气东来"是祥瑞之兆。紫禁城以紫命名，代表天帝居所。道教中紫色是最高境界的颜色。" },
  { color: "金色", hex: "#D4A017", meaning: "金色象征富贵、荣华和辉煌。古代金器是身份象征。佛教中金色代表佛光普照。"金榜题名"寓意科举高中。五行中属土。" }
];

function renderCulture() {
  document.getElementById('cultureGrid').innerHTML = cultureData.map(c => `
    <div class="culture-card">
      <div class="cc-swatch" style="background:${c.hex};"></div>
      <h3>${c.color}</h3>
      <p>${c.meaning}</p>
    </div>
  `).join('');
}

// ============ TABS ============
function switchTab(tabName) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
  document.getElementById(`panel-${tabName}`).classList.add('active');
}

// ============ COPY ============
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    showToast('已复制: ' + text);
  }).catch(() => {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    showToast('已复制: ' + text);
  });
}

// ============ EVENT LISTENERS ============
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// Query panel
document.getElementById('hexInput').addEventListener('input', function(e) {
  let val = e.target.value.replace(/^#/, '').toUpperCase().slice(0, 6);
  if (/^[0-9A-F]*$/i.test(val)) {
    if (val.length === 6) updateQueryPanel(val);
  }
});

document.getElementById('hexInput').addEventListener('blur', function() {
  const val = this.value.replace(/^#/, '');
  if (val.length === 6 && /^[0-9A-F]{6}$/i.test(val)) {
    this.value = '#' + val.toUpperCase();
    updateQueryPanel(val);
  }
});

document.getElementById('colorPicker').addEventListener('input', function() {
  updateQueryPanel(this.value);
});

document.querySelectorAll('[data-copy]').forEach(btn => {
  btn.addEventListener('click', function() {
    const panel = document.getElementById('panel-query');
    const type = this.dataset.copy;
    const map = { hex: 'currentHex', rgb: 'currentRgb', hsl: 'currentHsl', name: 'currentName' };
    copyText(panel.dataset[map[type]] || '');
  });
});

// Browse panel
document.getElementById('searchInput').addEventListener('input', function() {
  renderColorGrid(this.value);
});

// Palette panel
document.getElementById('paletteHexInput').addEventListener('input', function(e) {
  let val = e.target.value.replace(/^#/, '').toUpperCase().slice(0, 6);
  if (val.length === 6 && /^[0-9A-F]{6}$/i.test(val)) updatePalette(val);
});

document.getElementById('paletteHexInput').addEventListener('blur', function() {
  const val = this.value.replace(/^#/, '');
  if (val.length === 6 && /^[0-9A-F]{6}$/i.test(val)) {
    this.value = '#' + val.toUpperCase();
    updatePalette(val);
  }
});

document.getElementById('paletteColorPicker').addEventListener('input', function() {
  updatePalette(this.value);
});

// ============ INIT ============
updateQueryPanel('FF6633');
renderColorGrid();
renderCulture();
updatePalette('3B82F6');
</script>
